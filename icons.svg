<!--
  HOW TO USE THESE ICONS in your HTML:

  Place the <svg style="display:none"> block at the top of your <body>,
  then reference icons anywhere like this:

  <svg width="16" height="16">
    <use href="icons.svg#icon-book"/>
  </svg>

  OR inline the <use> tag like this:
  <svg width="16" height="16"><use href="#icon-book"/></svg>
  (if the sprite is embedded in the same HTML file)
-->